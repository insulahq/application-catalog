# --- Real client IP recovery (platform reverse proxy) ---
# Behind the platform's Traefik ingress the workload's TCP peer is a Traefik
# POD IP in the k3s pod CIDR (10.42.0.0/16, within 10.0.0.0/8), NOT the
# visitor. mod_remoteip rewrites the client address from X-Forwarded-For when
# the peer is a trusted proxy, so REMOTE_ADDR (seen by PHP as
# $_SERVER['REMOTE_ADDR']) and %a/%h in the access log reflect the real client
# instead of 10.42.x.x.
#
# Operators fronting the cluster with an external L4/L7 load balancer should
# add that LB's CIDR as an extra RemoteIPTrustedProxy line below.
RemoteIPHeader X-Forwarded-For
RemoteIPTrustedProxy 10.0.0.0/8
RemoteIPTrustedProxy 172.16.0.0/12
RemoteIPTrustedProxy 192.168.0.0/16
RemoteIPTrustedProxy fd00::/8
