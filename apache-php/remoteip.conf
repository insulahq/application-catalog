# --- Real client IP recovery (platform reverse proxy) ---
# Behind the platform's Traefik ingress the workload's TCP peer is a Traefik
# POD IP in the k3s pod CIDR (10.42.0.0/16, within 10.0.0.0/8), NOT the
# visitor. mod_remoteip rewrites the client address from X-Forwarded-For when
# the peer is a trusted proxy, so REMOTE_ADDR (seen by PHP as
# $_SERVER['REMOTE_ADDR']) and %a/%h in the access log reflect the real client
# instead of 10.42.x.x.
#
# Operators fronting the cluster with an external L4/L7 load balancer should
# add that LB's CIDR as an extra RemoteIPTrustedProxy line below.
RemoteIPHeader X-Forwarded-For
RemoteIPTrustedProxy 10.0.0.0/8
RemoteIPTrustedProxy 172.16.0.0/12
RemoteIPTrustedProxy 192.168.0.0/16
RemoteIPTrustedProxy fd00::/8

# --- Scheme-aware directory redirect (platform reverse proxy) ---
# TLS terminates at Traefik, so mod_dir's directory trailing-slash 301
# (/docs -> /docs/) would hardcode scheme http (the pod connection). Issue the
# redirect ourselves so it honors the edge scheme from X-Forwarded-Proto.
# (mod_headers can't fix mod_dir's Location — it lives in headers_out, which
# `Header always` doesn't touch.) Done in <Directory> context so REQUEST_FILENAME
# resolves for the -d test; only real directories are affected, so PHP
# front-controller routes (non-existent paths) are untouched.
<Directory "/var/www/html">
    Options +FollowSymLinks
    DirectorySlash Off
    RewriteEngine On
    # Real directory, no trailing slash, arrived via the TLS edge -> https.
    RewriteCond %{HTTP:X-Forwarded-Proto} =https
    RewriteCond %{REQUEST_FILENAME} -d
    RewriteCond %{REQUEST_URI} !/$
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI}/ [R=301,L,QSA]
    # Same, but plain http for direct (non-proxied) access.
    RewriteCond %{REQUEST_FILENAME} -d
    RewriteCond %{REQUEST_URI} !/$
    RewriteRule ^ %{REQUEST_URI}/ [R=301,L,QSA]
</Directory>
