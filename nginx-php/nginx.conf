server {
    listen 80 default_server;
    server_name _;
    root /var/www/html;
    index index.php index.html;

    # --- Real client IP recovery (platform reverse proxy) ---
    # Behind the platform's Traefik ingress the workload's TCP peer is a
    # Traefik POD IP in the k3s pod CIDR (10.42.0.0/16, within 10.0.0.0/8),
    # NOT the visitor. Trusting the RFC1918 super-set rewrites $remote_addr to
    # the real client, which then flows to PHP as REMOTE_ADDR via fastcgi_params
    # (so $_SERVER['REMOTE_ADDR'] is correct, not 10.42.x.x). Operators fronting
    # the cluster with an external load balancer should also trust its CIDR.
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    set_real_ip_from fd00::/8;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # --- Relative redirects (platform reverse proxy) ---
    # TLS terminates at Traefik, so nginx's own scheme is http, not the client's
    # https. With absolute redirects (the default) a directory trailing-slash 301
    # (e.g. /docs -> /docs/) would send the browser to http://<host>/docs/ — the
    # wrong scheme. A RELATIVE Location keeps the original https://<host>.
    absolute_redirect off;

    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    location ~ /\.ht {
        deny all;
    }

    client_max_body_size 64m;
}
