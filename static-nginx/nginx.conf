server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;
    root /var/www/html;
    index index.html index.htm;

    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    client_max_body_size 10m;

    # Optional custom config. When the NGINX_CONF_DIR env var is set, the
    # entrypoint writes a glue file into /etc/nginx/user-include that includes
    # the tenant's directory (and denies serving it if it sits under the web
    # root). With the var unset this directory holds no *.conf files, so the
    # include is a no-op and the default config above is used.
    include /etc/nginx/user-include/*.conf;
}
