server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;
    root /var/www/html;
    index index.html index.htm;

    # --- Real client IP recovery (platform reverse proxy) ---
    # Behind the platform's Traefik ingress the workload's TCP peer is a
    # Traefik POD IP in the k3s pod CIDR (10.42.0.0/16, within 10.0.0.0/8),
    # NOT the visitor. Trust the RFC1918 super-set the platform edge itself
    # trusts so $remote_addr / access logs reflect the real client instead of
    # 10.42.x.x. Operators fronting the cluster with an external L4/L7 load
    # balancer should also trust that LB's CIDR (extra set_real_ip_from lines).
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    set_real_ip_from fd00::/8;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # --- Relative redirects (platform reverse proxy) ---
    # TLS is terminated at Traefik and this server listens on :8080, so nginx's
    # own scheme/port are http/8080 — not the client's https/443. With absolute
    # redirects (the default) a directory trailing-slash 301 (e.g. /work ->
    # /work/) would send the browser to http://<host>:8080/work/, which is the
    # wrong scheme and an unexposed port. Emitting a RELATIVE Location (/work/)
    # makes the browser keep the original https://<host> instead.
    absolute_redirect off;

    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    client_max_body_size 10m;
}
