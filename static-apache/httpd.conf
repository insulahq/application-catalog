ServerRoot "/usr/local/apache2"
Listen 80
ServerName localhost
ServerTokens Prod
ServerSignature Off

LoadModule mpm_event_module modules/mod_mpm_event.so
LoadModule authn_file_module modules/mod_authn_file.so
LoadModule authn_core_module modules/mod_authn_core.so
LoadModule authz_host_module modules/mod_authz_host.so
LoadModule authz_groupfile_module modules/mod_authz_groupfile.so
LoadModule authz_user_module modules/mod_authz_user.so
LoadModule authz_core_module modules/mod_authz_core.so
LoadModule access_compat_module modules/mod_access_compat.so
LoadModule auth_basic_module modules/mod_auth_basic.so
LoadModule reqtimeout_module modules/mod_reqtimeout.so
LoadModule filter_module modules/mod_filter.so
LoadModule mime_module modules/mod_mime.so
LoadModule log_config_module modules/mod_log_config.so
LoadModule env_module modules/mod_env.so
LoadModule headers_module modules/mod_headers.so
LoadModule setenvif_module modules/mod_setenvif.so
LoadModule version_module modules/mod_version.so
LoadModule unixd_module modules/mod_unixd.so
LoadModule status_module modules/mod_status.so
LoadModule autoindex_module modules/mod_autoindex.so
LoadModule dir_module modules/mod_dir.so
LoadModule alias_module modules/mod_alias.so
LoadModule rewrite_module modules/mod_rewrite.so
LoadModule deflate_module modules/mod_deflate.so
LoadModule expires_module modules/mod_expires.so
LoadModule remoteip_module modules/mod_remoteip.so

User webuser
Group webuser

# --- Real client IP recovery (platform reverse proxy) ---
# Behind the platform's Traefik ingress the TCP peer is a Traefik POD IP in
# the k3s pod CIDR (10.42.0.0/16, within 10.0.0.0/8), NOT the visitor.
# mod_remoteip rewrites the client address (%a/%h and REMOTE_ADDR seen by any
# CGI/handler) from X-Forwarded-For when the peer is a trusted proxy, so logs
# and access rules reflect the real visitor instead of 10.42.x.x. Operators
# fronting the cluster with an external load balancer should add its CIDR too.
RemoteIPHeader X-Forwarded-For
RemoteIPTrustedProxy 10.0.0.0/8
RemoteIPTrustedProxy 172.16.0.0/12
RemoteIPTrustedProxy 192.168.0.0/16
RemoteIPTrustedProxy fd00::/8

ErrorLog /proc/self/fd/2
CustomLog /proc/self/fd/1 combined

DocumentRoot "/usr/local/apache2/htdocs"
<Directory "/usr/local/apache2/htdocs">
    Options Indexes FollowSymLinks
    AllowOverride All
    Require all granted

    # --- Scheme-aware directory redirect (platform reverse proxy) ---
    # TLS terminates at Traefik, so mod_dir's directory trailing-slash 301
    # (/work -> /work/) would hardcode scheme http (the pod connection). Issue
    # the redirect ourselves so it honors the edge scheme from X-Forwarded-Proto.
    # (mod_headers can't fix mod_dir's Location — it lives in headers_out, which
    # `Header always` doesn't touch.) DirectorySlash Off hands the slash logic to
    # these rules; done in <Directory> context so REQUEST_FILENAME resolves for -d.
    DirectorySlash Off
    RewriteEngine On
    # Real directory, no trailing slash, arrived via the TLS edge -> https.
    RewriteCond %{HTTP:X-Forwarded-Proto} =https
    RewriteCond %{REQUEST_FILENAME} -d
    RewriteCond %{REQUEST_URI} !/$
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI}/ [R=301,L,QSA]
    # Same, but plain http for direct (non-proxied) access.
    RewriteCond %{REQUEST_FILENAME} -d
    RewriteCond %{REQUEST_URI} !/$
    RewriteRule ^ %{REQUEST_URI}/ [R=301,L,QSA]
</Directory>

DirectoryIndex index.html index.htm

<IfModule mod_deflate.c>
    AddOutputFilterByType DEFLATE text/plain text/html text/xml text/css application/json application/javascript image/svg+xml
</IfModule>

<IfModule mod_expires.c>
    ExpiresActive On
    ExpiresByType image/jpg "access plus 30 days"
    ExpiresByType image/jpeg "access plus 30 days"
    ExpiresByType image/png "access plus 30 days"
    ExpiresByType image/gif "access plus 30 days"
    ExpiresByType image/svg+xml "access plus 30 days"
    ExpiresByType image/x-icon "access plus 30 days"
    ExpiresByType text/css "access plus 30 days"
    ExpiresByType application/javascript "access plus 30 days"
</IfModule>

# Health endpoint
Alias /health "/usr/local/apache2/htdocs/.health"
<Location "/health">
    SetHandler default-handler
    Header set Content-Type "text/plain"
</Location>
